services:
  app:
    build: .
    profiles:
      - app
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
    ports:
      - '3000:3000'

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: contacts
      MARIADB_USER: contacts
      MARIADB_PASSWORD: contacts
    ports:
      - '3306:3306'
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb-data:
